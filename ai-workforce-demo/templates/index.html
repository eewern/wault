<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workforce Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --bg-primary:#0a0e17; --bg-secondary:#111827; --bg-card:#1a2235; --bg-card-hover:#1f2a40;
  --border:#2a3550; --text-primary:#e2e8f0; --text-secondary:#94a3b8; --text-muted:#64748b;
  --blue:#3b82f6; --green:#10b981; --yellow:#f59e0b; --red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;overflow:hidden;}

.header{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-left{display:flex;align-items:center;gap:12px;}
.logo{font-size:22px;}
.header h1{font-size:16px;font-weight:700;letter-spacing:-0.5px;}
.header h1 span{color:var(--blue);}
.header-sub{font-size:10px;color:var(--text-muted);margin-top:1px;}
.status-badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.status-badge.active{background:rgba(245,158,11,.15);color:var(--yellow);border-color:rgba(245,158,11,.3);}

.control-panel{background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.control-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-right:6px;}
.btn{padding:6px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--blue);color:#fff;}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.btn-warning{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid rgba(245,158,11,.3);}
.btn-outline{background:transparent;color:var(--text-secondary);border:1px solid var(--border);}
.btn:hover{filter:brightness(1.15);}

/* Agent bar */
.agent-bar{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:10px 20px;background:var(--bg-primary);flex-shrink:0;}
.agent-card{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px;transition:all .2s;}
.agent-card.active{border-color:var(--yellow);box-shadow:0 0 0 1px rgba(245,158,11,.3);}
.agent-top{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.agent-icon{font-size:16px;}
.agent-name{font-size:11px;font-weight:600;flex:1;}
.agent-status{font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:10px;background:rgba(100,116,139,.2);color:var(--text-muted);}
.agent-status.active{background:rgba(245,158,11,.2);color:var(--yellow);}
.agent-task{font-size:10px;color:var(--text-secondary);min-height:13px;}
.agent-reasoning{font-size:9px;color:var(--text-muted);margin-top:3px;}
.agent-task-count{position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;border-radius:9px;background:var(--blue);color:#fff;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 4px;}
.agent-task-count.visible{display:flex;}

/* Main split */
.main{display:grid;grid-template-columns:1.5fr 1fr;gap:1px;background:var(--border);flex:1;min-height:0;}
.panel{background:var(--bg-primary);display:flex;flex-direction:column;min-height:0;}
.panel-head{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.panel-title{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;}
.panel-count{font-size:10px;color:var(--text-muted);}
.panel-body{flex:1;overflow-y:auto;padding:12px 16px;min-height:0;}

.welcome{text-align:center;padding:50px 20px;color:var(--text-muted);}
.welcome-icon{font-size:42px;margin-bottom:12px;}
.welcome h2{font-size:16px;color:var(--text-secondary);margin-bottom:8px;}
.welcome p{font-size:12px;}

/* Activity cards */
.activity-card{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:8px;padding:10px 12px;margin-bottom:10px;animation:in .2s ease-out;}
.activity-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.activity-agent-icon{font-size:14px;}
.activity-agent-name{font-size:11px;font-weight:600;}
.activity-phase{font-size:10px;color:var(--text-secondary);background:rgba(59,130,246,.12);padding:2px 7px;border-radius:10px;}
.activity-time{font-size:9px;color:var(--text-muted);margin-left:auto;font-family:'JetBrains Mono',monospace;}
.activity-reasoning{font-size:11px;line-height:1.7;color:var(--text-secondary);white-space:pre-line;}
.activity-output{font-size:10px;color:var(--green);margin-top:6px;}
.activity-handoff{font-size:10px;color:var(--blue);margin-top:6px;display:flex;align-items:center;gap:5px;}

/* Reasoning rich format */
.section-label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin:4px 0 2px;}
.system-row{display:block;margin:2px 0;}
.sys-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;}
.sys-get{background:rgba(59,130,246,.15);color:var(--blue);}
.sys-post{background:rgba(16,185,129,.15);color:var(--green);}
.sys-create{background:rgba(245,158,11,.15);color:var(--yellow);}
.sys-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.sys-name{font-weight:500;}
.sys-arrow{color:var(--text-muted);margin:0 3px;}
.highlight{color:var(--text-primary);font-weight:600;}
.checklist-item{display:block;margin:2px 0;}
.bullet-point{display:block;margin:1px 0;}
.dim{color:var(--text-muted);font-style:italic;}

/* Chat feed */
.msg{margin-bottom:10px;animation:in .2s ease-out;}
.msg-source{font-size:9px;font-weight:600;color:var(--text-muted);margin-bottom:2px;}
.msg-text{font-size:12px;line-height:1.5;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.msg-customer .msg-text{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);}
.msg-alert .msg-text{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);}
.empty-chat{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:12px;}
.empty-chat i{display:block;font-size:28px;margin-bottom:8px;opacity:.5;}

@keyframes in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.panel-body::-webkit-scrollbar{width:6px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <span class="logo">🤖</span>
    <div>
      <h1>AI <span>Workforce</span> Dashboard</h1>
      <div class="header-sub">Hardware Store · 6 agents · live order fulfillment</div>
    </div>
  </div>
  <span class="status-badge" id="system-status">● SYSTEM READY</span>
</div>

<div class="control-panel">
  <button class="btn btn-primary" id="btn-order" onclick="startOrder()"><i class="fas fa-play"></i> New Order</button>
  <span class="control-label">Inject</span>
  <button class="btn btn-danger" onclick="injectEvent('wrong_item')"><i class="fas fa-exclamation-triangle"></i> Wrong Item</button>
  <button class="btn btn-warning" onclick="injectEvent('stock_issue')"><i class="fas fa-search"></i> Stock Discrepancy</button>
  <button class="btn btn-outline" onclick="resetDemo()"><i class="fas fa-redo"></i> Reset</button>
</div>

<div class="agent-bar" id="agent-bar"></div>

<div class="main">
  <div class="panel" id="timeline-panel">
    <div class="panel-head">
      <span class="panel-title"><i class="fas fa-brain"></i> Agent Reasoning Timeline</span>
      <span class="panel-count" id="activity-count">0 steps</span>
    </div>
    <div class="panel-body" id="timeline-content">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🤖</div>
        <h2>Watch AI Agents Think &amp; Collaborate</h2>
        <p>Click <strong>"New Order"</strong> to see 6 AI agents reason through an order.</p>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head">
      <span class="panel-title"><i class="fas fa-comments"></i> Live Feed</span>
      <span class="panel-count"><span id="msg-count">0</span> messages</span>
    </div>
    <div class="panel-body" id="feed-messages">
      <div class="empty-chat" id="empty-chat"><i class="fas fa-comments"></i>No messages yet</div>
    </div>
  </div>
</div>

<script>
const AGENT_DEFS = [
  {id:"manager",  name:"Store Manager",   icon:"👔"},
  {id:"sales",    name:"Sales Associate", icon:"🏪"},
  {id:"warehouse",name:"Warehouse Picker",icon:"📦"},
  {id:"delivery", name:"Delivery Dispatch",icon:"🚚"},
  {id:"inventory",name:"Inventory Control",icon:"📊"},
  {id:"support",  name:"Customer Support",icon:"💬"},
];
let agents = {};
let activityCount = 0, messageCount = 0;
AGENT_DEFS.forEach(a => agents[a.id] = {status:'idle',task:'',reasoning:'',task_count:0});

async function init(){
  await loadState();
  connectSSE();
  renderAgents();
}

async function loadState(){
  const res = await fetch('/api/state');
  const data = await res.json();
  Object.assign(agents, data.agents);
  if(data.agent_task_counts){
    for(const aid in agents) agents[aid].task_count = data.agent_task_counts[aid] || 0;
  }
  (data.activities||[]).forEach(a => addActivity(a,false));
  activityCount = (data.activities||[]).length;
  document.getElementById('activity-count').textContent = activityCount + ' steps';
  (data.messages||[]).forEach(m => addMessage(m,false));
}

function connectSSE(){
  const es = new EventSource('/stream');
  es.addEventListener('message', e => addMessage(JSON.parse(e.data), true));
  es.addEventListener('activity', e => {
    const d = JSON.parse(e.data);
    activityCount++;
    document.getElementById('activity-count').textContent = activityCount + ' steps';
    addActivity(d, true);
  });
  es.addEventListener('agent', e => {
    const d = JSON.parse(e.data);
    if(agents[d.id]){
      agents[d.id].status = d.status;
      agents[d.id].task = d.task || '';
      agents[d.id].reasoning = d.reasoning || '';
      if(d.task_count !== undefined) agents[d.id].task_count = d.task_count;
      renderAgents();
    }
  });
  es.addEventListener('agents_reset', () => {
    AGENT_DEFS.forEach(a => agents[a.id] = {status:'idle',task:'',reasoning:'',task_count:0});
    renderAgents();
  });
  es.addEventListener('order_complete', () => {
    const s = document.getElementById('system-status');
    s.textContent = '● SYSTEM READY'; s.className = 'status-badge';
  });
}

async function startOrder(){
  const s = document.getElementById('system-status');
  s.textContent = '● ORDER PROCESSING'; s.className = 'status-badge active';
  const w = document.getElementById('welcome'); if(w) w.remove();
  await fetch('/api/order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({use_sample:true})});
}

async function injectEvent(type){
  const w = document.getElementById('welcome'); if(w) w.remove();
  await fetch('/api/inject', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type})});
}

async function resetDemo(){
  await fetch('/api/reset', {method:'POST'});
  activityCount = 0; messageCount = 0;
  AGENT_DEFS.forEach(a => agents[a.id] = {status:'idle',task:'',reasoning:'',task_count:0});
  document.getElementById('timeline-content').innerHTML =
    `<div class="welcome" id="welcome"><div class="welcome-icon">🤖</div>
     <h2>Watch AI Agents Think &amp; Collaborate</h2>
     <p>Click <strong>"New Order"</strong> to see 6 AI agents reason through an order.</p></div>`;
  document.getElementById('feed-messages').innerHTML =
    '<div class="empty-chat" id="empty-chat"><i class="fas fa-comments"></i>No messages yet</div>';
  document.getElementById('msg-count').textContent = '0';
  document.getElementById('activity-count').textContent = '0 steps';
  document.getElementById('system-status').textContent = '● SYSTEM READY';
  document.getElementById('system-status').className = 'status-badge';
  renderAgents();
}

function renderAgents(){
  document.getElementById('agent-bar').innerHTML = AGENT_DEFS.map(a => {
    const ag = agents[a.id] || {status:'idle',task:'',reasoning:'',task_count:0};
    const tc = ag.task_count || 0;
    return `<div class="agent-card ${ag.status}">
      <div class="agent-task-count ${tc>0?'visible':''}">${tc}</div>
      <div class="agent-top">
        <span class="agent-icon">${a.icon}</span>
        <span class="agent-name">${a.name}</span>
        <span class="agent-status ${ag.status}">${ag.status}</span>
      </div>
      <div class="agent-task">${ag.task || 'Waiting...'}</div>
    </div>`;
  }).join('');
}

function addActivity(act, animate){
  const w = document.getElementById('welcome'); if(w) w.remove();
  const container = document.getElementById('timeline-content');
  const def = AGENT_DEFS.find(a => a.id === act.agent_id);
  const icon = def ? def.icon : '🤖';
  const reasoningHtml = act.reasoning.includes('<') ? act.reasoning : `💭 ${act.reasoning}`;
  const div = document.createElement('div');
  div.className = 'activity-card';
  if(!animate) div.style.animation = 'none';
  let html = `<div class="activity-header">
    <span class="activity-agent-icon">${icon}</span>
    <span class="activity-agent-name">${def?def.name:act.agent_id}</span>
    <span class="activity-phase">${act.phase}</span>
    <span class="activity-time">${act.timestamp}</span>
  </div>
  <div class="activity-reasoning">${reasoningHtml}</div>`;
  if(act.output) html += `<div class="activity-output">📤 ${act.output}</div>`;
  if(act.handoff_to){
    const t = AGENT_DEFS.find(a => a.id === act.handoff_to);
    html += `<div class="activity-handoff"><i class="fas fa-arrow-right"></i> Handing off to ${t?t.name:act.handoff_to}</div>`;
  }
  div.innerHTML = html;
  container.appendChild(div);
  document.getElementById('timeline-panel').querySelector('.panel-body').scrollTop = 1e9;
}

function addMessage(msg, animate){
  const e = document.getElementById('empty-chat'); if(e) e.remove();
  const feed = document.getElementById('feed-messages');
  let cls = 'msg-agent';
  if(msg.is_customer) cls = 'msg-customer';
  if(msg.is_alert) cls = 'msg-alert';
  const div = document.createElement('div');
  if(!animate) div.style.animation = 'none';
  div.className = `msg ${cls}`;
  div.innerHTML = `<div class="msg-source">${msg.source}</div><div class="msg-text">${msg.text}</div>`;
  feed.appendChild(div);
  feed.scrollTop = 1e9;
  messageCount++;
  document.getElementById('msg-count').textContent = messageCount;
}

init();
</script>
</body>
</html>
