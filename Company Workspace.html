<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Workspace</title>

<style>
  /* === ROOT === */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    color: #e8e6e1;
    background: #0a0a0a;
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
  }
  #root { height: 100vh; }
  button { font-family: inherit; }

  /* === APP LAYOUT === */
  .app {
    display: grid;
    grid-template-columns: 260px 1fr 200px;
    height: 100vh;
    overflow: hidden;
  }

  /* === SIDEBAR === */
  .sidebar {
    background: #0f0f0f;
    border-right: 1px solid #1f1f1f;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid #1f1f1f;
  }
  .workspace-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .workspace-sub {
    font-size: 11px;
    color: #666;
    margin-top: 3px;
  }
  .sidebar-tree {
    flex: 1;
    overflow-y: auto;
    padding: 10px 6px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 8px;
    margin: 1px 4px;
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .sidebar-item:hover { background: #1a1a1a; }
  .sidebar-item.active { background: #222; }
  .sidebar-item.dragging { opacity: 0.4; }
  .sidebar-toggle, .sidebar-toggle-spacer {
    width: 16px;
    height: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    cursor: pointer;
    color: #666;
    font-size: 9px;
    flex-shrink: 0;
    border-radius: 3px;
  }
  .sidebar-toggle:hover { background: #2a2a2a; color: #ccc; }
  .sidebar-toggle-spacer { width: 16px; cursor: default; }
  .sidebar-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
  .sidebar-title {
    flex: 1;
    font-size: 13px;
    color: #d4d2cd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-item.active .sidebar-title { color: #fff; font-weight: 600; }
  .sidebar-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  .sidebar-item:hover .sidebar-actions { opacity: 1; }
  .sidebar-action-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #888;
    width: 20px;
    height: 20px;
    border-radius: 3px;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .sidebar-action-btn:hover { background: #2a2a2a; color: #fff; }

  .drop-line {
    height: 2px;
    background: #4dd4b0;
    margin: 0 12px;
    border-radius: 1px;
  }
  .drop-zone, .drop-zone-root {
    min-height: 8px;
  }
  .drop-zone-root {
    height: 24px;
  }

  .sidebar-footer {
    padding: 10px 12px 14px;
    border-top: 1px solid #1f1f1f;
    background: #0f0f0f;
  }
  .new-page-btn {
    width: 100%;
    padding: 8px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background .12s;
  }
  .new-page-btn:hover { background: #ddd; }
  .sidebar-util {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .util-btn {
    flex: 1;
    padding: 6px;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: all .12s;
  }
  .util-btn:hover { background: #1a1a1a; color: #fff; border-color: #444; }

  /* === PAGE MAIN === */
  .page-main {
    overflow-y: auto;
    background: #0a0a0a;
    position: relative;
  }
  .page-container {
    max-width: 760px;
    margin: 0 auto;
    padding: 64px 48px 240px;
  }
  .page-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 14px;
  }
  .page-header { margin-bottom: 12px; }
  .page-body { display: flex; flex-direction: column; }
  .page-footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid #1a1a1a;
  }
  .add-subpage-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #888;
    cursor: pointer;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 5px;
    transition: all .12s;
  }
  .add-subpage-btn:hover { background: #222; color: #fff; }

  /* === EDITABLE TEXT === */
  .editable {
    outline: none;
    cursor: text;
    border-radius: 3px;
    padding: 1px 3px;
    margin: -1px -3px;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    min-height: 1em;
  }
  .editable:hover { background: rgba(255,255,255,0.02); }
  .editable:focus { background: rgba(77,212,176,0.06); }
  .editable:empty::before,
  .editable[data-placeholder]:not(:focus):empty::before {
    content: attr(data-placeholder);
    color: #555;
    pointer-events: none;
  }
  .editable b, .editable strong { font-weight: 700; color: #fff; }
  .editable i, .editable em { font-style: italic; }
  .editable u { text-decoration: underline; }
  .editable s, .editable strike { text-decoration: line-through; }

  /* === BLOCK WRAP === */
  .block-wrap {
    position: relative;
    padding: 1px 0;
  }
  .block-wrap:hover .block-handle { opacity: 1; }
  .block-handle {
    position: absolute;
    left: -26px;
    top: 8px;
    width: 18px;
    height: 22px;
    background: none;
    border: none;
    cursor: pointer;
    color: #444;
    opacity: 0;
    transition: opacity .15s, color .15s;
    border-radius: 3px;
    font-size: 11px;
    line-height: 1;
    letter-spacing: -1px;
  }
  .block-handle:hover { color: #ff6b5c; background: #1a1a1a; }

  /* === CALLOUT === */
  .callout {
    background: #14130f;
    border: 1px solid #2a2820;
    border-left: 3px solid #4dd4b0;
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin: 10px 0;
  }

  /* === LIST BLOCKS === */
  .list-block { margin: 6px 0; }
  .list-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 2px 0;
  }
  .bullet-dot {
    margin-top: 8px;
    color: #555;
    font-size: 18px;
    line-height: 1;
    min-width: 14px;
    text-align: center;
  }
  .number-dot {
    margin-top: 4px;
    color: #888;
    font-size: 14px;
    font-weight: 500;
    min-width: 22px;
    line-height: 1.65;
    text-align: right;
    padding-right: 2px;
  }

  /* === CHECKLIST === */
  .check-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 5px;
    margin-bottom: 3px;
    background: #111;
    border: 1px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .check-row:hover { background: #161616; border-color: #222; }
  .check-row.done { opacity: 0.55; }
  .check-box {
    width: 18px;
    height: 18px;
    border: 1.5px solid #444;
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .12s;
  }
  .check-box:hover { border-color: #4dd4b0; }

  /* === PROGRESS BAR === */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: #1a1a1a;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #4dd4b0;
    transition: width .3s;
  }
  .progress-text {
    font-size: 11px;
    color: #888;
    font-weight: 600;
    min-width: 76px;
    text-align: right;
    letter-spacing: 0.3px;
  }

  /* === ROW DELETE === */
  .row-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #333;
    width: 22px;
    height: 22px;
    border-radius: 3px;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
    opacity: 0;
    transition: all .12s;
  }
  .list-row:hover .row-del,
  .check-row:hover .row-del,
  .milestone-row:hover .row-del { opacity: 1; }
  .row-del:hover { background: #1a1a1a; color: #ff6b5c; }

  .add-row-btn {
    background: none;
    border: none;
    color: #555;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    margin-top: 2px;
    text-align: left;
    transition: all .12s;
  }
  .add-row-btn:hover { background: #1a1a1a; color: #fff; }

  /* === KPI CARDS === */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin: 10px 0;
  }
  .kpi-card {
    position: relative;
    background: #111;
    border: 1px solid #1f1f1f;
    border-radius: 8px;
    padding: 14px;
    transition: border-color .12s;
  }
  .kpi-card:hover { border-color: #2a2a2a; }
  .kpi-card:hover .kpi-del { opacity: 1; }
  .kpi-del {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 18px;
    height: 18px;
    background: none;
    border: none;
    cursor: pointer;
    color: #444;
    border-radius: 3px;
    font-size: 13px;
    opacity: 0;
    transition: all .12s;
  }
  .kpi-del:hover { background: #1a1a1a; color: #ff6b5c; }
  .kpi-add {
    background: #0f0f0f;
    border: 1.5px dashed #2a2a2a;
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    color: #555;
    font-size: 12px;
    font-weight: 500;
    transition: all .12s;
    min-height: 96px;
  }
  .kpi-add:hover { background: #161616; border-color: #4dd4b0; color: #4dd4b0; }

  /* === MILESTONES === */
  .milestone-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    background: #111;
    border: 1px solid #1f1f1f;
    border-radius: 6px;
  }
  .milestone-row:hover { background: #161616; }

  /* === TABLE === */
  .tbl-wrap {
    margin: 10px 0;
    border: 1px solid #1f1f1f;
    border-radius: 8px;
    overflow-x: auto;
  }
  .tbl-wrap table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
  }
  .tbl-wrap th {
    background: #111;
    padding: 0;
    text-align: left;
    border-bottom: 1px solid #1f1f1f;
  }
  .tbl-head {
    display: flex;
    align-items: center;
    padding: 8px 12px;
  }
  .tbl-wrap td {
    padding: 10px 12px;
    border-bottom: 1px solid #161616;
    border-right: 1px solid #161616;
    vertical-align: top;
  }
  .tbl-wrap td:last-child, .tbl-wrap th:last-child { border-right: none; }
  .tbl-wrap tr:last-child td { border-bottom: none; }
  .tbl-add {
    background: none;
    border: 1px dashed #2a2a2a;
    color: #666;
    font-size: 11px;
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .tbl-add:hover { background: #1a1a1a; color: #fff; }
  .tbl-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #333;
    width: 18px;
    height: 18px;
    border-radius: 3px;
    font-size: 12px;
    line-height: 1;
    transition: all .12s;
  }
  .tbl-del:hover { background: #1a1a1a; color: #ff6b5c; }
  .tbl-add-row {
    background: none;
    border: none;
    border-top: 1px solid #1f1f1f;
    color: #555;
    width: 100%;
    padding: 10px;
    cursor: pointer;
    font-size: 13px;
    transition: all .12s;
  }
  .tbl-add-row:hover { background: #111; color: #fff; }

  /* === DIVIDER === */
  .divider {
    border: none;
    border-top: 1px solid #1f1f1f;
    margin: 24px 0;
  }

  /* === ADD BLOCK PROMPT === */
  .add-block-prompt {
    background: none;
    border: 1px dashed transparent;
    color: #444;
    cursor: text;
    font-size: 13px;
    padding: 12px 10px;
    border-radius: 5px;
    margin-top: 16px;
    text-align: left;
    transition: all .12s;
    font-family: inherit;
  }
  .add-block-prompt:hover { border-color: #2a2a2a; background: #0f0f0f; color: #888; }

  /* === SLASH MENU === */
  .slash-menu {
    position: absolute;
    z-index: 1000;
    background: #18181a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 6px;
    min-width: 220px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    max-height: 320px;
    overflow-y: auto;
  }
  .slash-hint {
    padding: 6px 8px 4px;
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .slash-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-size: 13px;
    color: #d4d2cd;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }
  .slash-item.active, .slash-item:hover { background: #25252a; color: #fff; }
  .slash-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #25252a;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    color: #aaa;
    flex-shrink: 0;
  }

  /* === FORMAT TOOLBAR === */
  .fmt-toolbar {
    position: fixed;
    z-index: 1100;
    transform: translateX(-50%);
    background: #18181a;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    padding: 4px;
    display: flex;
    align-items: center;
    gap: 2px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.6);
  }
  .fmt-toolbar button {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    width: 28px;
    height: 28px;
    border-radius: 4px;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
  }
  .fmt-toolbar button:hover { background: #25252a; color: #fff; }
  .fmt-divider {
    width: 1px;
    height: 16px;
    background: #2a2a2a;
    margin: 0 2px;
  }

  /* === TOC === */
  .toc {
    background: #0a0a0a;
    border-left: 1px solid #1a1a1a;
    padding: 64px 16px 24px;
    overflow-y: auto;
    font-size: 12px;
  }
  .toc-title {
    font-size: 10px;
    color: #555;
    letter-spacing: 1.5px;
    font-weight: 700;
    margin-bottom: 10px;
    padding: 0 6px;
  }
  .toc-empty {
    color: #444;
    font-size: 12px;
    padding: 0 6px;
  }
  .toc-list { display: flex; flex-direction: column; }
  .toc-item {
    background: none;
    border: none;
    cursor: pointer;
    color: #888;
    text-align: left;
    padding: 4px 6px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    line-height: 1.4;
    transition: all .12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-left: 2px solid transparent;
  }
  .toc-item:hover { color: #fff; background: #14140f; }
  .toc-l1 { font-weight: 600; padding-left: 6px; }
  .toc-l2 { padding-left: 16px; font-size: 11.5px; }
  .toc-l3 { padding-left: 26px; font-size: 11px; color: #666; }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  /* === RESPONSIVE === */
  @media (max-width: 1000px) {
    .app { grid-template-columns: 240px 1fr; }
    .toc { display: none; }
  }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .page-container { padding: 32px 20px 100px; }
  }

  /* selection */
  ::selection {
    background: rgba(77, 212, 176, 0.3);
    color: #fff;
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Data: load XALT Bible content first, then workspace defaults -->
<script src="xalt-bible-data.js"></script>
<script src="workspace-data.js"></script>
<script type="text/babel" src="workspace-blocks.jsx"></script>
<script type="text/babel" src="workspace-app.jsx"></script>
</body>
</html>
