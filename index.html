  .subpage-link:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .subpage-link-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; flex-shrink: 0; color: var(--text-muted);
  }
  .subpage-link-title {
    font-size: 15px; font-weight: 500;
    border-bottom: 1px solid var(--line);
    line-height: 1.4; padding-bottom: 1px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .subpage-link:hover .subpage-link-title { border-bottom-color: var(--text-muted); }
  .subpage-link-arrow { color: var(--text-muted); opacity: 0; transition: opacity .12s; margin-left: 2px; flex-shrink: 0; }
  .subpage-link:hover .subpage-link-arrow { opacity: 1; }
  .subpage-link.missing { color: var(--text-muted); cursor: default; }
  .subpage-link.missing .subpage-link-title { border-bottom-style: dashed; }

  /* ---- Block action menu (⋮⋮ options) ---- */
  .blockmenu-backdrop { position: fixed; inset: 0; z-index: 10000; }
  .blockmenu {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(var(--ovr),0.02);
    max-height: 340px; overflow-y: auto;
  }
  .blockmenu-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; text-align: left;
    padding: 7px 10px; border: none; border-radius: 6px;
    background: none; cursor: pointer;
    color: var(--text-strong); font-size: 14px; font-weight: 500;
    transition: background .1s;
  }
  .blockmenu-item:hover { background: var(--panel-hover); }
  .blockmenu-item.danger { color: var(--kpi-red); }
  .blockmenu-item.danger:hover { background: rgba(240,112,112,0.12); }
  .blockmenu-ico {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; flex-shrink: 0; color: var(--text-muted);
  }
  .blockmenu-item.danger .blockmenu-ico { color: var(--kpi-red); }
  .blockmenu-sep { height: 1px; background: var(--line); margin: 6px 4px; }
  .blockmenu-label {
    font-size: 11px; font-weight: 600; letter-spacing: .04em;
    text-transform: uppercase; color: var(--text-muted);
    padding: 4px 10px 2px;
  }

  /* ---- Page icon picker ---- */
  .page-icon-wrap { position: relative; display: inline-block; }
  .page-icon-btn {
    background: none; border: none; cursor: pointer; padding: 4px;
    border-radius: 8px; line-height: 0; color: var(--text);
    transition: background .12s;
  }
  .page-icon-btn:hover { background: var(--panel-hover); }
  .page-icon-popover {
    position: absolute; top: 100%; left: 0; z-index: 9999; margin-top: 6px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.55);
    width: 300px;
  }
  .page-icon-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
    max-height: 200px; overflow-y: auto;
  }
  .page-icon-cell {
    display: flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; padding: 0;
    background: none; border: 1px solid transparent; border-radius: 7px;
    cursor: pointer; color: var(--text-muted); transition: all .1s;
  }
  .page-icon-cell:hover { background: var(--panel-hover); color: var(--text-strong); }
  .page-icon-cell.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .page-icon-emoji-row { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
  .page-icon-emoji-input {
    flex: 1; min-width: 0; background: rgba(var(--ovr),0.05);
    border: 1px solid var(--line); border-radius: 7px;
    color: var(--text-strong); font-size: 13px; padding: 7px 10px; outline: none;
  }
  .page-icon-emoji-input:focus { border-color: var(--accent); }
  .page-icon-emoji-apply {
    background: var(--accent-soft); border: 1px solid var(--accent);
    color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 600;
    padding: 0 14px; border-radius: 7px;
  }
  .page-icon-emoji-apply:hover { background: var(--accent); color: #fff; }

  /* ---- Team panel + modal ---- */
  .team-panel { width: 100%; }
  .team-manage-btn {
    background: var(--panel-hover); border: 1px solid var(--line);
    color: var(--text); cursor: pointer; font-size: 11px; font-weight: 600;
    min-height: 28px;
    padding: 4px 10px; border-radius: 6px; transition: all .12s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    box-sizing: border-box;
  }
  .team-manage-btn:hover { background: var(--panel-active); color: var(--text-strong); }
  .team-icon-btn {
    width: 28px;
    height: 28px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 28px;
    align-self: center;
    box-sizing: border-box;
    line-height: 0;
    margin: 0;
    vertical-align: middle;
  }
  .team-icon-btn svg {
    width: 15px;
    height: 15px;
    display: block;
    flex: 0 0 15px;
  }
  .team-modal-overlay {
    position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .team-modal-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; width: min(440px, 92vw); max-height: 82vh;
    overflow-y: auto; box-shadow: 0 24px 70px rgba(0,0,0,0.6);
  }
  .team-modal-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 18px 20px 14px; border-bottom: 1px solid var(--line-soft);
    position: sticky; top: 0; background: var(--panel); z-index: 1;
  }
  .team-modal-close {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 20px; line-height: 1;
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
  }
  .team-modal-close:hover { background: var(--panel-hover); color: var(--text-strong); }
  .team-role-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 999px; flex-shrink: 0;
    background: var(--accent-soft); color: var(--accent);
  }
  .team-member-row, .team-pending-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 9px;
    background: rgba(var(--ovr),0.03); border: 1px solid var(--line-soft);
    margin-bottom: 6px;
  }
  .team-pending-row { background: rgba(245,166,35,0.07); border-color: rgba(245,166,35,0.2); }
  .team-approve-btn {
    background: rgba(61,214,140,0.15); border: 1px solid rgba(61,214,140,0.35);
    color: var(--kpi-green); cursor: pointer; font-size: 12px; font-weight: 600;
    padding: 5px 11px; border-radius: 6px; flex-shrink: 0;
  }
  .team-approve-btn:hover { background: rgba(61,214,140,0.25); }
  .team-remove-btn {
    background: none; border: 1px solid var(--line);
    color: var(--text-muted); cursor: pointer; font-size: 12px;
    padding: 5px 9px; border-radius: 6px; flex-shrink: 0;
  }
  .team-remove-btn:hover { color: var(--kpi-red); border-color: rgba(240,112,112,0.4); background: rgba(240,112,112,0.08); }
  .team-copy-btn {
    background: var(--panel-hover); border: 1px solid var(--line);
    color: var(--text); cursor: pointer; font-size: 12px;
    padding: 6px 12px; border-radius: 6px;
  }
  .team-copy-btn:hover { background: var(--panel-active); }
  .team-msg { font-size: 12px; padding: 8px 12px; border-radius: 7px; margin-top: 8px; }
  .team-msg.err { background: rgba(240,112,112,0.12); color: var(--kpi-red); }

  /* ---- Presence lock label + avatar photo ---- */
  .block-lock-label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis;
  }
  .presence-avatar-img { object-fit: cover; }

  /* ---- Google sign-in button ---- */
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; background: #fff; color: #222;
    border: none; border-radius: 10px; padding: 12px 24px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: filter .12s;
  }
  .google-btn:hover { filter: brightness(0.95); }

  /* ---- Calendar nav extras ---- */
  .calendar-nav { display: flex; align-items: center; gap: 6px; }
  .calendar-nav-btn {
    background: var(--panel-hover); border: 1px solid var(--line);
    color: var(--text); cursor: pointer; width: 28px; height: 28px;
    border-radius: 6px; font-size: 16px; line-height: 1; display: flex;
    align-items: center; justify-content: center;
  }
  .calendar-nav-btn:hover { background: var(--panel-active); }
  .calendar-today-btn {
    background: var(--panel-hover); border: 1px solid var(--line);
    color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600;
    padding: 5px 12px; border-radius: 6px;
  }
  .calendar-today-btn:hover { background: var(--panel-active); color: var(--text-strong); }
  .calendar-day-row { display: flex; align-items: center; justify-content: space-between; }
  .calendar-day-count {
    font-size: 10px; font-weight: 700; min-width: 16px; height: 16px;
    border-radius: 999px; background: var(--accent-soft); color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  .calendar-page-pill-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- Content-shooting paste helper ---- */
  .shoot-paste-btn {
    background: var(--panel-hover); border: 1px solid var(--line);
    color: var(--text); cursor: pointer; font-size: 12px;
    padding: 6px 12px; border-radius: 6px;
  }
  .shoot-paste-btn:hover { background: var(--panel-active); color: var(--text-strong); }
  .shoot-paste-area {
    width: 100%; box-sizing: border-box; min-height: 120px;
    background: rgba(var(--ovr),0.05); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text-strong); font-size: 13px;
    padding: 10px 12px; outline: none; resize: vertical; font-family: inherit;
  }
  .shoot-paste-area:focus { border-color: var(--accent); }
  .shoot-paste-apply {
    background: var(--accent-soft); border: 1px solid var(--accent);
    color: var(--accent); cursor: pointer; font-size: 13px; font-weight: 600;
    padding: 7px 16px; border-radius: 7px; margin-top: 8px;
  }
  .shoot-paste-apply:hover { background: var(--accent); color: #fff; }
  .shoot-paste-cancel {
    background: none; border: 1px solid var(--line);
    color: var(--text-muted); cursor: pointer; font-size: 13px;
    padding: 7px 14px; border-radius: 7px; margin-top: 8px; margin-left: 8px;
  }
  .shoot-paste-cancel:hover { background: var(--panel-hover); }

  /* ---- Milestones: list/board toggle + kanban view ---- */
  .milestone-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .milestone-viewtoggle {
    display: inline-flex; flex-shrink: 0; background: rgba(var(--ovr),0.05);
    border: 1px solid var(--line); border-radius: 8px; padding: 2px; gap: 2px;
  }
  .milestone-viewtoggle button {
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 6px; font-family: inherit;
  }
  .milestone-viewtoggle button.active { background: var(--panel-active); color: var(--text-strong); }
  .milestone-kanban {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; align-items: start;
  }
  .kanban-col {
    background: rgba(var(--ovr),0.025); border: 1px solid var(--line-soft);
    border-radius: 10px; padding: 8px; min-height: 80px;
  }
  .kanban-col-head {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; font-weight: 700; padding: 4px 8px 8px; color: var(--text);
  }
  .kanban-col-head.kanban-pending { color: #aaa; }
  .kanban-col-head.kanban-active  { color: #e8c460; }
  .kanban-col-head.kanban-done    { color: #4dd4b0; }
  .kanban-col-count {
    font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; padding: 0 5px;
    border-radius: 999px; background: rgba(var(--ovr),0.08); color: var(--text-muted);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .kanban-col-body { display: flex; flex-direction: column; gap: 6px; }
  .kanban-card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 8px; padding: 7px 9px 4px; position: relative;
  }
  .kanban-card-tools {
    display: flex; gap: 2px; justify-content: flex-end;
    margin-top: 4px; padding-top: 3px; border-top: 1px solid var(--line-soft);
    opacity: 0; transition: opacity .12s;
  }
  .kanban-card:hover .kanban-card-tools { opacity: 1; }
  .kanban-card-tools button {
    background: none; border: 1px solid var(--line); color: var(--text-muted);
    cursor: pointer; width: 20px; height: 18px; border-radius: 4px; font-size: 12px;
    line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .kanban-card-tools button:hover:not(:disabled) { background: var(--panel-hover); color: var(--text-strong); }
  .kanban-card-tools button:disabled { opacity: 0.3; cursor: default; }
  .kanban-card-tools .row-del:hover { color: #ff7369; border-color: rgba(255,115,105,0.4); }
  .kanban-add {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 12px; text-align: left; padding: 5px 8px; border-radius: 6px; font-family: inherit;
  }
  .kanban-add:hover { background: rgba(var(--ovr),0.05); color: var(--text); }

  /* ---- Claude API Key modal ---- */
  .api-step {
    display: flex; gap: 12px; align-items: flex-start;
  }
  .api-step-num {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    background: rgba(236,107,160,0.18); border: 1px solid rgba(236,107,160,0.4);
    color: #ec6ba0; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .api-step-body { flex: 1; min-width: 0; }
  .api-step-title { font-size: 13px; font-weight: 600; color: var(--text-strong); margin-bottom: 4px; }
  .api-step-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .api-key-box {
    display: flex; align-items: center; gap: 6px;
    background: rgba(var(--ovr),0.05); border: 1px solid var(--line);
    border-radius: 8px; padding: 8px 10px; font-family: monospace;
  }
  .api-key-text { flex: 1; font-size: 12px; color: var(--text-strong); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .api-key-toggle, .api-key-copy-btn {
    background: none; border: 1px solid var(--line); color: var(--text-muted);
    cursor: pointer; font-size: 11px; font-weight: 600; padding: 3px 9px;
    border-radius: 5px; white-space: nowrap; flex-shrink: 0;
  }
  .api-key-toggle:hover, .api-key-copy-btn:hover { background: var(--panel-hover); color: var(--text-strong); }
  .api-code-block {
    background: rgba(0,0,0,0.3); border: 1px solid var(--line);
    border-radius: 7px; padding: 10px 12px; margin-top: 8px;
    font-family: monospace; font-size: 11.5px; color: var(--text);
    white-space: pre-wrap; word-break: break-all; overflow-x: auto;
    line-height: 1.6;
  }

  /* ============================================================
     MOBILE RESPONSIVE  (≤ 768px)
     ============================================================ */

  /* Hamburger button — hidden on desktop, visible on mobile */
  .mobile-menu-btn {
    display: none;
    position: fixed;
    top: 12px; left: 12px;
    z-index: 1500;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    width: 40px; height: 40px;
    align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  /* Overlay behind open sidebar on mobile */
  .mobile-sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1098;
    background: rgba(0,0,0,0.55);
  }

  @media (max-width: 768px) {
    html, body { font-size: 15px; }
    #root { height: 100dvh; }

    /* ── App shell ── */
    .app {
      grid-template-columns: 1fr !important;
      grid-template-rows: 1fr;
    }

    /* ── Sidebar: off-canvas drawer ── */
    aside.sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 280px;
      height: 100dvh;
      z-index: 1099;
      transform: translateX(-100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    aside.sidebar { display: flex; }
    .app.mobile-sidebar-open aside.sidebar { transform: translateX(0); }
    .app.mobile-sidebar-open .mobile-sidebar-overlay { display: block; }
    /* The fixed hamburger sits at top-left; when the drawer is open it would
       overlap the workspace switcher, so hide it (tap the overlay to close). */
    .app.mobile-sidebar-open .mobile-menu-btn { display: none; }

    /* ── TOC: hidden on mobile ── */
    .toc, .app.toc-collapsed .toc { display: none !important; }

    /* ── Hamburger: visible ── */
    .mobile-menu-btn { display: inline-flex; }

    /* ── Page main: full width, add top padding for hamburger ── */
    .page-main {
      grid-column: 1;
      padding-top: 0;
      overflow-y: auto;
    }
    .page-container {
      padding: 60px 16px 40px 38px; /* extra left = gutter for the always-on drag handle */
      max-width: 100%;
    }

    /* ── Page header ── */
    .page-header { margin-bottom: 8px; }
    .page-header .editable[style*="font-size:40"] { font-size: 26px !important; margin: 4px 0 16px !important; }
    .page-header-actions { flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .page-pdf-btn, .page-tpl-btn { font-size: 12px; padding: 5px 10px; }

    /* ── Tables: horizontal scroll ── */
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 320px; }

    /* ── Overflow safety: let flex children shrink so long content wraps
       instead of pushing the page sideways. ── */
    .page-container, .callout, .check-row { min-width: 0; }
    .callout > *, .check-row > * { min-width: 0; }
    .page-container img, .page-container pre, .page-container video { max-width: 100%; }

    /* ── Kanban: single-column scroll ── */
    .milestone-kanban { grid-template-columns: 1fr; gap: 8px; }

    /* ── Format bar: full width ── */
    .fmt-bar { left: 8px !important; right: 8px !important; width: auto !important; }

    /* ── Template / modal: full width ── */
    .template-modal { width: min(96vw, 480px); }

    /* ── Block handle: always visible in the left gutter, and a touch target
       that drags instead of scrolling the page (touch-action:none). ── */
    .block-wrap .block-handle {
      opacity: 0.5;
      left: -32px;            /* sits in the page-container left gutter (≈6px from edge) */
      width: 28px;
      touch-action: none;
    }
    .block-wrap .block-handle:active { opacity: 0.9; }

    /* ── Slash menu: full width ── */
    .slash-menu { min-width: 88vw; max-width: 92vw; }

    /* ── Checklist / task items: larger tap targets ── */
    .check-row { min-height: 44px; }
    .check-checkbox { width: 20px; height: 20px; }

    /* ── TOC toggle button: hide (no TOC on mobile) ── */
    .toc-toggle { display: none; }

    /* ── Blocks: add room for the hamburger ── */
    .block-wrap { padding-left: 0; }

    /* ── Auth gate ── */
    .auth-gate { padding: 16px; }
    .auth-card { padding: 36px 24px !important; }

    /* ── Modals: full-bleed, scrollable body, never wider than the screen ── */
    .team-modal-card,
    .template-modal,
    .cal-event-modal,
    .page-icon-popover,
    .category-popover-card { width: min(96vw, 480px); max-width: calc(100vw - 20px); }
    .team-modal-card, .template-modal, .cal-event-modal { max-height: 88dvh; overflow-y: auto; }
    /* Floating popovers anchored by JS can sit near an edge — keep them on-screen. */
    .page-icon-popover, .sidebar-ctx-menu { max-width: calc(100vw - 20px); }
    /* Stack any 2–3 column grids inside modals so fields don't squish. */
    .sync-actions { grid-template-columns: 1fr; }
  }

  @media (max-width: 480px) {
    .page-container { padding: 56px 12px 32px 36px; } /* keep the left drag-handle gutter */
    .page-header .editable[style*="font-size:40"] { font-size: 22px !important; }
    .milestone-kanban { gap: 6px; }
    .blockmenu { min-width: 88vw; }
  }

  /* ════════════════════════════════════════════════════════════════════════
     WAULT FOCUS — in-app Home view (focus-home.jsx).
     Ported from focus/index.html and scoped under .focus-home, then re-tinted
     onto the host app's theme tokens so all 5 themes work, plus a premium
     contrast/pop upgrade. Additive only — no existing selector is touched.
     ════════════════════════════════════════════════════════════════════════ */
  .focus-home {
    /* Variable bridge: define the Focus palette names on this scope so every
       ported `var(--danger)` etc. resolves without renaming. Bare-rgba line
       first (older engines), color-mix refinement second (Chrome 111+/Safari 16.2+). */
    --danger: var(--kpi-red);
    --ok: var(--kpi-green);
    --amber: var(--kpi-amber);
    --danger-soft: rgba(240,112,104,0.14);
    --danger-soft: color-mix(in srgb, var(--kpi-red) 17%, transparent);
    --amber-soft: rgba(232,196,96,0.16);
    --amber-soft: color-mix(in srgb, var(--kpi-amber) 20%, transparent);
    --ok-soft: rgba(61,214,140,0.15);
    --ok-soft: color-mix(in srgb, var(--kpi-green) 17%, transparent);
    --text-faint: rgba(140,150,160,0.5);
    --text-faint: color-mix(in srgb, var(--text-muted) 62%, transparent);
    --line-strong: rgba(140,150,160,0.3);
    --line-strong: color-mix(in srgb, var(--text) 22%, transparent);

    /* Secondary hue — a soft indigo used sparingly for highlights (pinned /
       active states / pin star) to add a hint of colour without competing
       with the teal accent or the red/amber/green status colours. */
    --fx-violet: #7c83f5;
    --fx-violet-soft: rgba(124,131,245,0.15);
    --fx-violet-soft: color-mix(in srgb, #7c83f5 18%, transparent);

    height: 100%;
    background: var(--bg);
    color: var(--text);
  }
  /* Indigo reads a touch too light on a white background — deepen it. */
  [data-theme="light"] .focus-home { --fx-violet: #5b61d6; }
  .focus-home .fx-shell { max-width: 1140px; margin: 0 auto; padding: 30px 30px 90px; }

  /* ── Hero (premium gradient card) ───────────────────────────────────────── */
  .focus-home .fx-hero {
    display: flex; align-items: center; justify-content: space-between; gap: 18px;
    margin: 4px 0 22px; padding: 20px 22px; border-radius: 14px;
    background: var(--panel);
    /* faint single-direction accent tint — calm, not glowing */
    background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 6%, var(--panel)), var(--panel) 55%);
    border: 1px solid var(--line);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .focus-home .fx-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
  .focus-home .fx-eyebrow b { color: var(--accent); }
  .focus-home .fx-date { font-size: 28px; color: var(--text-strong); font-weight: 800; letter-spacing: -0.02em; }
  .focus-home .fx-sub { font-size: 13.5px; color: var(--text-muted); margin-top: 4px; }
  .focus-home .fx-sub-warn { color: var(--danger); font-weight: 700; }
  /* Prominent at-a-glance counts under the date. */
  .focus-home .fx-hero-counts { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 9px; }
  .focus-home .fx-count-big { font-size: 14px; color: var(--text-muted); font-weight: 600; }
  .focus-home .fx-count-big b { font-size: 19px; font-weight: 800; color: var(--text-strong); margin-right: 3px; font-variant-numeric: tabular-nums; }
  .focus-home .fx-count-accent b { color: var(--accent); }
  .focus-home .fx-count-warn b { color: var(--danger); }
  .focus-home .fx-count-warn { color: var(--danger); }
  .focus-home .fx-hero-side { display: flex; align-items: center; gap: 12px; }
  .focus-home .fx-streak {
    font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 99px; white-space: nowrap;
    color: #fff;
    background: linear-gradient(135deg, var(--amber), color-mix(in srgb, var(--kpi-red) 55%, var(--amber)));
    box-shadow: 0 3px 12px color-mix(in srgb, var(--amber) 40%, transparent);
  }
  .focus-home .fx-sync { width: 9px; height: 9px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .focus-home .fx-sync-off { background: var(--text-faint); box-shadow: none; }
  .focus-home .fx-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .focus-home .fx-ring-arc { filter: none; }
  .focus-home .fx-ring-label { position: absolute; font-size: 9.5px; font-weight: 800; color: var(--text-strong); font-variant-numeric: tabular-nums; }

  /* ── Quick add ──────────────────────────────────────────────────────────── */
  .focus-home .fx-quickadd {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--line-strong); border-radius: 14px;
    padding: 4px 6px 4px 14px; margin-bottom: 22px;
    transition: border-color .14s ease, box-shadow .14s ease;
  }
  .focus-home .fx-quickadd:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .focus-home .fx-quickadd-plus { color: var(--accent); font-weight: 700; font-size: 18px; }
  .focus-home .fx-quickadd input { flex: 1; background: none; border: none; outline: none; color: var(--text-strong); font-size: 14.5px; padding: 11px 0; }
  .focus-home .fx-quickadd input::placeholder { color: var(--text-faint); }
  .focus-home .fx-quickadd-chips { display: flex; gap: 5px; }
  .focus-home .fx-quickadd-go {
    background: var(--accent); color: #fff; border: none; border-radius: 9px;
    font-size: 13px; font-weight: 700; padding: 9px 16px; cursor: pointer;
    transition: opacity .14s ease, transform .12s ease, box-shadow .14s ease;
    box-shadow: 0 2px 10px color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .focus-home .fx-quickadd-go:disabled { opacity: 0.25; cursor: default; box-shadow: none; }
  .focus-home .fx-quickadd-go:not(:disabled):active { transform: scale(0.96); }

  /* ── Workspace cards ────────────────────────────────────────────────────── */
  .focus-home .fx-ws { margin-bottom: 22px; }
  .focus-home .fx-ws-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
  .focus-home .fx-ws-head h2 { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); font-weight: 700; margin: 0; }
  .focus-home .fx-ws-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
  .focus-home .fx-ws-card {
    display: flex; align-items: center; gap: 12px; text-align: left;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px; cursor: pointer; color: var(--text);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .focus-home .fx-ws-card:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.12); border-color: var(--line-strong); }
  .focus-home .fx-ws-active { border-color: var(--fx-violet); box-shadow: 0 0 0 1px var(--fx-violet) inset; }
  .focus-home .fx-ws-active:hover { border-color: var(--fx-violet); }
  .focus-home .fx-ws-icon {
    width: 38px; height: 38px; min-width: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 800; color: var(--accent);
    background: var(--accent-soft);
  }
  .focus-home .fx-ws-meta { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .focus-home .fx-ws-name { font-size: 14px; font-weight: 700; color: var(--text-strong); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .focus-home .fx-ws-sub { font-size: 11.5px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  /* Inline trailing chip (not an absolute overlay) so a long name truncates with
     an ellipsis and the badge always sits to its right — never overlapping. */
  .focus-home .fx-ws-badge {
    flex-shrink: 0; align-self: center; font-size: 9px; font-weight: 800; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--fx-violet); background: var(--fx-violet-soft);
    padding: 3px 8px; border-radius: 99px;
  }

  /* ── Layout grid ────────────────────────────────────────────────────────── */
  .focus-home .fx-grid { display: grid; grid-template-columns: minmax(0, 1fr) 300px; gap: 28px; align-items: start; }
  .focus-home .fx-side { display: flex; flex-direction: column; gap: 12px; position: sticky; top: 18px; }

  /* ── Buckets ────────────────────────────────────────────────────────────── */
  .focus-home .fx-bucket { margin-bottom: 26px; }
  .focus-home .fx-bucket-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 11px; flex-wrap: wrap; }
  /* Bigger, clearly readable section headers (was a tiny 12px). */
  .focus-home .fx-bucket-head h2 { font-size: 14.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-strong); font-weight: 800; margin: 0; display: flex; align-items: center; gap: 9px; }
  /* Calm status cue: a small coloured dot before the heading. */
  .focus-home .fx-bucket-head h2::before {
    content: ""; width: 8px; height: 8px; min-width: 8px; border-radius: 50%;
    background: var(--text-faint);
  }
  .focus-home .fx-bucket-sub { font-size: 12px; color: var(--text-faint); }
  .focus-home .fx-count {
    font-size: 11px; font-weight: 800; background: var(--accent-soft); color: var(--accent);
    border-radius: 99px; padding: 2px 9px; font-variant-numeric: tabular-nums; transition: background .2s ease;
  }
  /* Today's Focus — the primary block: large title + extra breathing room. */
  .focus-home .fx-focus-block { margin-bottom: 30px; }
  .focus-home .fx-focus-title { font-size: 22px !important; letter-spacing: -0.01em !important; text-transform: none !important; font-weight: 800; color: var(--fx-violet) !important; gap: 11px !important; }
  .focus-home .fx-focus-title::before { width: 10px !important; height: 10px !important; min-width: 10px !important; background: var(--fx-violet) !important; }
  .focus-home .fx-b-pinned  .fx-count { background: var(--fx-violet-soft); color: var(--fx-violet); }
  .focus-home .fx-b-overdue  .fx-bucket-head h2 { color: var(--danger); }
  .focus-home .fx-b-overdue  .fx-bucket-head h2::before { background: var(--danger); }
  .focus-home .fx-b-overdue  .fx-count { background: var(--danger-soft); color: var(--danger); }
  .focus-home .fx-b-today    .fx-bucket-head h2 { color: var(--accent); }
  .focus-home .fx-b-today    .fx-bucket-head h2::before { background: var(--accent); }
  .focus-home .fx-b-upcoming .fx-bucket-head h2::before { background: var(--fx-violet); }
  .focus-home .fx-b-nodate   { opacity: 0.92; }
  .focus-home .fx-b-hold     { opacity: 0.9; }

  /* ── Task rows ──────────────────────────────────────────────────────────── */
  .focus-home .fx-task {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 9px 8px 9px 4px; border-radius: 10px; border-bottom: 1px solid var(--line);
    transition: background .14s ease, opacity .24s ease, transform .24s ease;
  }
  .focus-home .fx-task:hover { background: var(--panel-hover); }
  .focus-home .fx-task-leaving { opacity: 0; transform: translateX(10px); }
  .focus-home .fx-task-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
  .focus-home .fx-task-title { font-size: 14.5px; color: var(--text); line-height: 1.45; cursor: text; word-break: break-word; }
  .focus-home .fx-task-big .fx-task-title { font-size: 18px; font-weight: 600; color: var(--text-strong); }
  .focus-home .fx-task-done .fx-task-title { text-decoration: line-through; color: var(--text-faint); }
  .focus-home .fx-task-edit { background: none; border: none; outline: none; border-bottom: 1px solid var(--accent); color: var(--text-strong); font-size: 14.5px; padding: 0 0 2px; width: 100%; }
  .focus-home .fx-task-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .focus-home .fx-task-src { font-size: 11px; color: var(--text-faint); background: none; border: none; cursor: pointer; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0; }
  .focus-home .fx-task-src:hover { color: var(--accent); }
  .focus-home .fx-task-actions { display: flex; gap: 2px; opacity: 0; transition: opacity .14s ease; padding-top: 2px; }
  .focus-home .fx-task:hover .fx-task-actions, .focus-home .fx-task:focus-within .fx-task-actions { opacity: 1; }

  .focus-home .fx-check {
    width: 22px; height: 22px; min-width: 22px; border-radius: 50%;
    border: 1.5px solid var(--line-strong); background: none; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    color: transparent; font-size: 11px; cursor: pointer; transition: all 0.16s ease;
  }
  .focus-home .fx-check:hover { border-color: var(--accent); color: var(--accent); }
  .focus-home .fx-check.fx-on { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 10px color-mix(in srgb, var(--accent) 45%, transparent); }
  .focus-home .fx-check:active { transform: scale(0.88); }
  .focus-home .fx-task-big .fx-check { width: 27px; height: 27px; min-width: 27px; font-size: 13px; }

  .focus-home .fx-mini { background: none; border: none; color: var(--text-faint); font-size: 13px; padding: 3px 6px; border-radius: 6px; line-height: 1; cursor: pointer; transition: background .12s ease, color .12s ease; }
  .focus-home .fx-mini:hover { background: var(--panel); color: var(--text); }
  .focus-home .fx-mini-del:hover { color: var(--danger); }
  .focus-home .fx-pin-on { color: var(--fx-violet); }

  /* ── Pills (vivid) ──────────────────────────────────────────────────────── */
  .focus-home .fx-pill {
    font-size: 10px; font-weight: 800; letter-spacing: 0.05em; padding: 2px 8px;
    border-radius: 99px; white-space: nowrap; line-height: 1.5; position: relative;
    border: 1px solid transparent; background: var(--panel-hover); color: var(--text-muted);
  }
  .focus-home button.fx-pill { cursor: pointer; }
  .focus-home .fx-pill-high { background: var(--danger-soft); color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, transparent); }
  .focus-home .fx-pill-medium { background: var(--amber-soft); color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, transparent); }
  .focus-home .fx-pill-low { background: var(--panel-hover); color: var(--text-muted); }
  .focus-home .fx-pill-due { background: var(--panel-hover); color: var(--text-muted); cursor: pointer; }
  .focus-home .fx-pill-due.fx-today { background: var(--amber-soft); color: var(--amber); border-color: color-mix(in srgb, var(--amber) 40%, transparent); }
  .focus-home .fx-pill-due.fx-overdue { background: var(--danger-soft); color: var(--danger); border-color: color-mix(in srgb, var(--danger) 40%, transparent); }
  .focus-home .fx-pill-due input[type="date"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  /* ── Done accordion ─────────────────────────────────────────────────────── */
  .focus-home .fx-done-toggle { display: flex; align-items: center; gap: 7px; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; padding: 4px 0; margin-bottom: 4px; }
  .focus-home .fx-done-chev { display: inline-block; transition: transform .16s ease; }
  .focus-home .fx-done-chev.fx-open { transform: rotate(90deg); }
  .focus-home .fx-b-done .fx-task { opacity: 0.62; }

  /* ── Side cards (hover-lift) ────────────────────────────────────────────── */
  .focus-home .fx-card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 15px; transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; }
  .focus-home .fx-card:hover { border-color: var(--accent-soft); }
  .focus-home .fx-card-h { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; }
  .focus-home .fx-up-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .focus-home .fx-up-row:last-child { border-bottom: none; }
  .focus-home .fx-up-date { color: var(--text-muted); white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 52px; }
  .focus-home .fx-up-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .focus-home .fx-dot { width: 6px; height: 6px; min-width: 6px; border-radius: 50%; display: inline-block; }
  .focus-home .fx-dot-due { background: var(--danger); }
  .focus-home .fx-dot-ev { background: var(--accent); }

  .focus-home .fx-pull-row { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid var(--line); padding: 7px 2px; color: var(--text); font-size: 12.5px; border-radius: 6px; cursor: pointer; transition: background .12s ease; }
  .focus-home .fx-pull-row:hover { background: var(--panel-hover); }
  .focus-home .fx-pull-row:last-child { border-bottom: none; }
  .focus-home .fx-pull-plus { color: var(--accent); font-weight: 700; }
  .focus-home .fx-pull-src { font-size: 10.5px; color: var(--text-faint); white-space: nowrap; max-width: 32%; overflow: hidden; text-overflow: ellipsis; }

  /* ── Mini calendar ──────────────────────────────────────────────────────── */
  .focus-home .fx-cal-head { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; font-weight: 600; color: var(--text-strong); margin-bottom: 8px; }
  .focus-home .fx-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .focus-home .fx-cal-dow { font-size: 9.5px; color: var(--text-faint); text-align: center; padding: 2px 0; font-weight: 700; }
  .focus-home .fx-cal-day { position: relative; font-size: 11px; color: var(--text-muted); text-align: center; padding: 4px 0 8px; border-radius: 7px; font-variant-numeric: tabular-nums; }
  .focus-home .fx-cal-today { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
  .focus-home .fx-cal-dots { position: absolute; bottom: 2px; left: 0; right: 0; display: flex; justify-content: center; gap: 2px; }
  .focus-home .fx-cal-dots .fx-dot { width: 4px; height: 4px; min-width: 4px; }

  /* Week-completed stat folded into the calendar card footer. */
  .focus-home .fx-cal-foot { display: flex; align-items: baseline; gap: 7px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); font-size: 12px; color: var(--text-muted); }
  .focus-home .fx-cal-foot-num { font-size: 18px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }

  .focus-home .fx-empty { font-size: 12.5px; color: var(--text-faint); padding: 10px 2px; line-height: 1.5; }

  .focus-home .fx-fade { animation: fxFade 0.3s ease both; }
  @keyframes fxFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) {
    .focus-home .fx-fade { animation: none; }
    .focus-home * { transition: none !important; }
  }
  @media (max-width: 980px) {
    .focus-home .fx-grid { grid-template-columns: 1fr; }
    .focus-home .fx-side { position: static; }
    .focus-home .fx-shell { padding: 26px 22px 80px; }
  }
  @media (max-width: 640px) {
    /* Phone: single column, generous tap targets, no hover-only affordances. */
    .focus-home .fx-shell { padding: 18px 14px 96px; }
    .focus-home .fx-hero { flex-direction: column; align-items: flex-start; gap: 14px; padding: 18px; }
    .focus-home .fx-hero-side { align-self: stretch; justify-content: flex-start; }
    .focus-home .fx-date { font-size: 22px; }
    .focus-home .fx-focus-title { font-size: 19px !important; }
    .focus-home .fx-ws-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .focus-home .fx-quickadd { flex-wrap: wrap; padding: 8px 10px; }
    .focus-home .fx-quickadd input { flex: 1 1 100%; padding: 8px 0; }
    .focus-home .fx-quickadd-chips { order: 2; }
    .focus-home .fx-quickadd-go { order: 3; margin-left: auto; }
    /* Actions always visible (no hover on touch) + bigger hit areas. */
    .focus-home .fx-task-actions { opacity: 1; }
    .focus-home .fx-mini { padding: 6px 9px; font-size: 15px; }
    .focus-home .fx-task { padding: 11px 6px; }
    .focus-home .fx-check { width: 26px; height: 26px; min-width: 26px; }
    .focus-home .fx-task-src { max-width: 60vw; }
  }
  @media (max-width: 400px) {
    .focus-home .fx-ws-grid { grid-template-columns: 1fr; }
  }

  /* Focus/Home view: clear the fixed hamburger (top-left) on phone/tablet.
     Placed after the Focus breakpoints above so it wins over their fx-shell
     padding shorthands. Matches the ≤768px range where the hamburger shows. */
  @media (max-width: 768px) {
    .focus-home .fx-shell { padding-top: 64px; }
  }

  /* ── Touch devices: reveal hover-only affordances ──────────────────────────
     Controls that fade in on :hover are invisible on touch, where there is no
     hover. Show them whenever the primary pointer can't hover (phones/tablets),
     independent of viewport width. */

<!-- ── Global JS tooltip engine ──────────────────────────────────────────────
     Renders a single position:fixed tooltip on <body>, so it can never be clipped
     by an ancestor's overflow:hidden (which is why the old CSS ::after tooltips
     failed for the top/header sidebar buttons). Reads `data-tooltip` (preferred)
     or `title`. Auto-flips above/below and clamps to the viewport. -->
<script>
(function () {
  var tip = null, current = null, showTimer = null;

  function el() {
    if (!tip) {
      tip = document.createElement('div');
      tip.id = 'wn-tooltip';
      document.body.appendChild(tip);
    }
    return tip;
  }

  function textFor(node) {
    // Prefer data-tooltip; fall back to title (and neutralise the native title so it
    // doesn't double up with a slow browser tooltip).
    var t = node.getAttribute('data-tooltip');
    if (!t) {
      var title = node.getAttribute('title');
      if (title) {
        node.setAttribute('data-tooltip', title);
        node.setAttribute('data-native-title', title);
        node.removeAttribute('title');
        t = title;
      }
    }
    return t;
  }

  function place(node) {
    var t = textFor(node);
    if (!t) return;
    var e = el();
    e.textContent = t;
    e.classList.remove('is-visible');
    // Measure off-screen first
    e.style.left = '-9999px';
    e.style.top = '-9999px';
    e.style.display = 'block';
    var r = node.getBoundingClientRect();
    var tr = e.getBoundingClientRect();
    var gap = 8;
    // Prefer above; if not enough room, go below.
    var top = r.top - tr.height - gap;
    if (top < 6) top = r.bottom + gap;
    var left = r.left + r.width / 2 - tr.width / 2;
    if (left < 6) left = 6;
    if (left + tr.width > window.innerWidth - 6) left = window.innerWidth - tr.width - 6;
    e.style.left = Math.round(left) + 'px';
    e.style.top = Math.round(top) + 'px';
    // Next frame → fade in
    requestAnimationFrame(function () { e.classList.add('is-visible'); });
  }

  function hide() {
    current = null;
    if (showTimer) { clearTimeout(showTimer); showTimer = null; }
    if (tip) { tip.classList.remove('is-visible'); tip.style.display = 'none'; }
  }

  document.addEventListener('mouseover', function (ev) {
    var node = ev.target.closest && ev.target.closest('[data-tooltip],[title]');
    if (!node || node === current) return;
    // Only show for elements that opt in via .has-tip OR explicitly carry data-tooltip.
    if (!node.classList.contains('has-tip') && !node.hasAttribute('data-tooltip') && !node.hasAttribute('title')) return;
    current = node;
    if (showTimer) clearTimeout(showTimer);
    showTimer = setTimeout(function () { if (current === node) place(node); }, 55);
  });

  document.addEventListener('mouseout', function (ev) {
    var node = ev.target.closest && ev.target.closest('[data-tooltip],[title]');
    if (!node) return;
    // Ignore moves to a child of the same node
    if (ev.relatedTarget && node.contains(ev.relatedTarget)) return;
    hide();
  });

  // Hide on any interaction/scroll so it never lingers in the wrong spot.
  document.addEventListener('mousedown', hide, true);
  document.addEventListener('click', hide, true);
  window.addEventListener('scroll', hide, true);
  window.addEventListener('blur', hide);
})();
</script>
